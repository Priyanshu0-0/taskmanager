<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskBubble - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- INLINE VIBRANT GEOMETRIC CSS - NO EXTERNAL STYLES.CSS -->
  <style>
    :root {
      --bubble-pink: #2d96ff;
      --bubble-cyan: #00F5FF;
      --bubble-yellow: #FFEA00;
      --bubble-purple: #8B00FF;
    }

    * {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body {
      background: linear-gradient(135deg, #1A0033 0%, #2E0066 50%, #660033 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* GEOMETRIC BACKGROUND PATTERN */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255, 45, 149, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
        linear-gradient(45deg, transparent 40%, rgba(255, 234, 0, 0.08) 40%, rgba(255, 234, 0, 0.08) 60%, transparent 60%);
      background-size: 120px 120px;
      pointer-events: none;
      z-index: -1;
    }

    /* NAVBAR - SUPER VIBRANT & GEOMETRIC */
    .navbar {
      background: linear-gradient(90deg, var(--bubble-pink), var(--bubble-purple)) !important;
      box-shadow: 0 10px 30px rgba(255, 45, 149, 0.4);
      border-bottom: 6px solid var(--bubble-yellow);
      padding: 1rem 0;
    }

    .navbar-brand {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #FFEA00, #FFFFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255, 234, 0, 0.6);
    }

    .nav-link {
      color: rgb(0, 0, 0) !important;
      font-weight: 700;
      margin: 0 12px;
      position: relative;
    }

    .nav-link:hover {
      color: var(--bubble-yellow) !important;
      transform: scale(1.1) rotate(3deg);
    }

    .nav-link.active {
      color: var(--bubble-yellow) !important;
      text-shadow: 0 0 15px var(--bubble-yellow);
    }

    .btn-light {
      background: white;
      color: var(--bubble-pink);
      font-weight: 800;
      border: 3px solid var(--bubble-yellow);
      box-shadow: 0 8px 0 #00000033;
    }

    .btn-light:hover {
      transform: translateY(-4px) rotate(-2deg);
      box-shadow: 0 12px 0 #00000033;
    }

    /* HERO SECTION - MAX UPBEAT ENERGY */
    .hero-container {
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
    }

    h1.display-3 {
      font-size: 4.8rem;
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(90deg, #FF2D95, #00F5FF, #FFEA00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      letter-spacing: -3px;
    }

    .lead {
      font-size: 1.65rem;
      color: #fff;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      font-weight: 600;
    }

    /* VIBRANT BUTTON */
    .btn-pink {
      background: linear-gradient(45deg, var(--bubble-pink), #FF6BC6);
      color: white;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 18px 60px !important;
      border-radius: 50px;
      border: 6px solid white;
      box-shadow: 0 15px 0 #00000044, 
                  0 0 40px rgba(255, 45, 149, 0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-pink:hover {
      transform: translateY(-12px) scale(1.08) rotate(2deg);
      box-shadow: 0 25px 0 #00000044, 
                  0 0 60px rgba(255, 45, 149, 0.9);
      color: white;
    }

    /* GEOMETRIC DECOR ELEMENTS */
    .geometric-bubble {
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(255, 234, 0, 0.2);
      border: 8px solid var(--bubble-cyan);
      border-radius: 40% 60% 70% 30% / 50% 30% 70% 50%;
      filter: blur(8px);
      z-index: -1;
      animation: float 12s infinite ease-in-out;
    }

    .geometric-bubble:nth-child(1) {
      top: 15%;
      left: 8%;
      animation-delay: 0s;
    }

    .geometric-bubble:nth-child(2) {
      bottom: 20%;
      right: 10%;
      width: 240px;
      height: 240px;
      animation-delay: 4s;
      border-color: var(--bubble-pink);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-60px) rotate(15deg); }
    }

    /* EXTRA FUN */
    .container.text-center.py-5 {
      padding-top: 8rem !important;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">TaskBubble 🎨</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="home.html">Home</a>
        <a class="nav-link" href="projects.html">Projects</a>
        <a class="nav-link" href="dashbord.html">Dashboard</a>
        <a class="nav-link btn btn-light ms-3 px-3" href="indexing.html">Login</a>
      </div>
    </div>
  </nav>

  <div class="container hero-container text-center py-5 position-relative">
    
    <!-- GEOMETRIC DECOR BUBBLES -->
    <div class="geometric-bubble"></div>
    <div class="geometric-bubble"></div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h1 class="display-3 fw-bold mb-4">Welcome to TaskBubble 🎉</h1>
        <p class="lead fs-4 mb-5">
          The fun &amp; ridiculously simple way for teams to create projects,<br>
          assign tasks, high efficiency with minimal efforts.
        </p>

        <div class="d-flex justify-content-center gap-3">
          <a href="indexing.html" class="btn btn-pink btn-lg px-5 py-3">
            Get Started - Login / Signup
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
