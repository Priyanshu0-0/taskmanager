<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail - TaskBubble</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">TaskBubble</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="home.html">Home</a>
        <a class="nav-link" href="projects.html">Projects</a>
        <a class="nav-link" href="dashbord.html">Dashboard</a>
        <a class="nav-link btn btn-light ms-3 px-3" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 id="projectTitle" class="fw-bold">Project Name</h2>
      <button id="addMemberBtn" onclick="addMember()" class="btn btn-primary d-none">+ Add Member</button>
    </div>

    <div class="row">
      <!-- Task Creation -->
      <div class="col-md-4">
        <div class="card p-4 mb-4">
          <h5 class="mb-3">Create New Task</h5>
          <input id="taskTitle" class="form-control mb-2" placeholder="Task Title">
          <textarea id="taskDesc" class="form-control mb-3" rows="2" placeholder="Description"></textarea>
          <button onclick="createTask()" class="btn btn-primary w-100">Create Task</button>
        </div>
      </div>

      <!-- Tasks List -->
      <div class="col-md-8">
        <h5 class="mb-3"></h5>
        <div id="taskList" class="row"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = sessionStorage.getItem('token');
    const projectId = sessionStorage.getItem('currentProjectId');
    if (!token || !projectId) location.href = 'projects.html';

    let currentUserRole = 'MEMBER';

    async function loadProjectDetail() {
      const payload = JSON.parse(atob(token.split('.')[1]));
      currentUserRole = payload.role;

      const res = await fetch(`https://taskmanager-6q51.onrender.com/api/projects/${projectId}/tasks`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const tasks = await res.json();

      let html = '';
      tasks.forEach(t => {
        html += `
          <div class="col-12 mb-3">
            <div class="card">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <h5>${t.title}</h5>
                  <small class="text-muted">${t.description || ''}</small>
                </div>
                <div>
                  <span class="badge status-${t.status.toLowerCase()} me-2">${t.status}</span>
                  <button onclick="deleteTask(${t.id})" class="btn btn-sm btn-outline-danger">Delete</button>
                </div>
              </div>
            </div>
          </div>`;
      });

      document.getElementById('taskList').innerHTML = html || '<p class="text-center text-muted">No tasks yet. Create one!</p>';

      // Show Add Member button for Admin/Owner
      if (currentUserRole === 'ADMIN') {
        document.getElementById('addMemberBtn').classList.remove('d-none');
      }
    }

    function createTask() {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) return alert("Task title is required");

      fetch(`https://taskmanager-6q51.onrender.com/api/projects/${projectId}/tasks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ 
          title: title, 
          description: document.getElementById('taskDesc').value 
        })
      }).then(() => {
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        loadProjectDetail();
      });
    }

    function deleteTask(taskId) {
  if (!confirm("Are you sure you want to delete this task?")) return;

  fetch(`https://taskmanager-6q51.onrender.com/api/tasks/${taskId}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` }
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || data.error);
    loadProjectDetail();  
  })
  .catch(() => alert("Failed to delete task"));
}
    function addMember() {
      const userId = prompt("Enter User ID to add:");
      if (!userId) return;
      alert("Member added (demo)");
    }

    function logout() {
      sessionStorage.clear();
      location.href = 'indexing.html';
    }

    loadProjectDetail();
  </script>
</body>
</html>
