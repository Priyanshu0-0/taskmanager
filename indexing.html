<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskBubble - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header text-center bg-primary text-white">
            <h3>TaskBubble</h3>
          </div>
          <div class="card-body">
            <ul class="nav nav-tabs mb-4">
              <li class="nav-item"><a class="nav-link active" id="userTab" onclick="showUser()">User</a></li>
              <li class="nav-item"><a class="nav-link" id="adminTab" onclick="showAdmin()">Admin</a></li>
            </ul>

            <!-- USER SECTION -->
            <div id="userSection">
              <h5 class="mb-3">User Login</h5>
              <input id="userEmail" type="email" class="form-control mb-2" placeholder="Email">
              <input id="userPassword" type="password" class="form-control mb-3" placeholder="Password">
              <button onclick="userLogin()" class="btn btn-primary w-100 mb-3">Login as User</button>
              <p class="text-center">Don't have account? 
                <a href="#" onclick="showSignup()">Sign Up</a>
              </p>
            </div>

            <!-- ADMIN SECTION -->
            <div id="adminSection" class="d-none">
              <h5 class="mb-3">Admin Login</h5>
              <input id="adminEmail" type="email" class="form-control mb-2" placeholder="Email">
              <input id="adminPassword" type="password" class="form-control mb-3" placeholder="Password">
              <button onclick="adminLogin()" class="btn btn-danger w-100 mb-3">Login as Admin</button>
              <p class="text-center">No admin account?
                <a href="#" onclick="showSignup()">Sign Up as Admin</a>
              </p>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signupSection" class="d-none">
              <h5 class="mb-3">Create New Account</h5>
              <input id="signupName" type="text" class="form-control mb-2" placeholder="Full Name">
              <input id="signupEmail" type="email" class="form-control mb-2" placeholder="Email">
              <input id="signupPassword" type="password" class="form-control mb-3" placeholder="Password">
              <small class="text-muted d-block mb-3">Use <strong>admin@test.com</strong> to register as Admin</small>
              <button onclick="signup()" class="btn btn-success w-100">Create Account</button>
              <p class="text-center mt-3"><a href="#" onclick="backToLogin()">Back to Login</a></p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://taskmanager-6q51.onrender.com';

    function showUser() {
      document.getElementById('userSection').classList.remove('d-none');
      document.getElementById('adminSection').classList.add('d-none');
      document.getElementById('signupSection').classList.add('d-none');
      document.getElementById('userTab').classList.add('active');
      document.getElementById('adminTab').classList.remove('active');
    }

    function showAdmin() {
      document.getElementById('adminSection').classList.remove('d-none');
      document.getElementById('userSection').classList.add('d-none');
      document.getElementById('signupSection').classList.add('d-none');
      document.getElementById('adminTab').classList.add('active');
      document.getElementById('userTab').classList.remove('active');
    }

    function showSignup() {
      document.getElementById('signupSection').classList.remove('d-none');
      document.getElementById('userSection').classList.add('d-none');
      document.getElementById('adminSection').classList.add('d-none');
    }

    function backToLogin() {
      showUser();
    }

    function saveSession(data) {
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('role', data.user ? data.user.role : data.role);
      sessionStorage.setItem('userId', data.user ? data.user.id : '');
      sessionStorage.setItem('userName', data.user ? data.user.name : '');
    }

    async function signup() {
      const res = await fetch(`${API}/api/signup`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPassword').value
        })
      });
      const data = await res.json();
      if (data.token) {
        saveSession(data);
        location.href = 'home.html';
      } else alert(data.error || 'Signup failed');
    }

    async function userLogin() {
      const res = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('userEmail').value,
          password: document.getElementById('userPassword').value
        })
      });
      const data = await res.json();
      if (data.token) {
        saveSession(data);
        location.href = 'home.html';
      } else alert(data.error || 'Login failed');
    }

    async function adminLogin() {
      const res = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('adminEmail').value,
          password: document.getElementById('adminPassword').value
        })
      });
      const data = await res.json();
      if (data.token) {
        saveSession(data);
        location.href = 'home.html';
      } else alert(data.error || 'Login failed');
    }
  </script>
</body>
</html>
