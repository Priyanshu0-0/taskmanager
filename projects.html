<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - TaskBubble</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    :root {
      --red: #EF4444;
      --deep-red: #B91C1C;
      --yellow: #FACC15;
      --gold: #F59E0B;
      --dark-bg: #1A0F0F;
      --slate: #2C1F1F;
      --text: #FEF2F2;
      --muted: #FCA5A5;
    }

    * {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: #1A0F0F;
      color: var(--text);
      font-family: 'Inter', system_ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    .navbar {
      background: rgba(26, 15, 15, 0.95) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.3);
      padding: 1.1rem 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .navbar-brand {
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--yellow);
    }

    .nav-link {
      color: var(--muted) !important;
      font-weight: 600;
      padding: 0.5rem 1rem;
      margin: 0 4px;
      border-radius: 8px;
    }

    .nav-link:hover,
    .nav-link.active {
      color: white !important;
      background: rgba(239, 68, 68, 0.2);
    }

    .btn-light {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--muted);
      font-weight: 700;
      padding: 0.6rem 1.4rem;
    }

    .btn-light:hover {
      background: var(--yellow);
      color: var(--deep-red);
      border-color: var(--yellow);
    }

    .container.mt-5 {
      max-width: 1280px;
    }

    h2.display-5 {
      font-weight: 700;
      color: var(--yellow);
      letter-spacing: -1.5px;
    }

    .card {
      background: var(--slate);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.3);
      border-color: var(--yellow);
    }

    .card h4 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--yellow);
    }

    .card p {
      color: var(--muted);
      font-size: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-pink {
      background: linear-gradient(90deg, var(--red), var(--deep-red));
      color: white;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 12px;
      border: none;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.25);
      font-size: 1.1rem;
    }

    .btn-pink:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.25);
      filter: brightness(1.15);
    }

    .btn-light.w-100 {
      background: transparent;
      color: var(--text);
      border: 2px solid rgba(250, 204, 21, 0.4);
      font-weight: 600;
    }

    .btn-light.w-100:hover {
      background: var(--yellow);
      color: var(--deep-red);
      border-color: var(--yellow);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 1.15rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="home.html">TaskBubble</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="home.html">Home</a>
        <a class="nav-link active" href="projects.html">Projects</a>
        <a class="nav-link" href="dashbord.html">Dashboard</a>
        <a class="nav-link btn btn-light ms-3 px-3" onclick="logout()">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <h2 class="display-5 fw-bold">My Projects</h2>
      <button onclick="createNewProject()" class="btn btn-pink btn-lg">+ Create New Project</button>
    </div>

    <div id="projectList" class="row g-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = sessionStorage.getItem('token');
    if (!token) location.href = 'indexing.html';

    async function loadProjects() {
      try {
        const res = await fetch('http://127.0.0.1:5000/api/projects', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const projects = await res.json();
       
        let html = '';
        projects.forEach(p => {
          html += `
            <div class="col-md-6 col-lg-4 mb-4">
              <div class="card h-100 p-4">
                <h4>${p.name}</h4>
                <p>${p.description || 'No description provided yet.'}</p>
                <button onclick="openProject(${p.id})" class="btn btn-light w-100 mt-3">Open Project →</button>
              </div>
            </div>`;
        });

        document.getElementById('projectList').innerHTML = html || `
          <div class="col-12 empty-state">
            <h3>No projects yet</h3>
            <p class="mb-4">Create your first project to get started.</p>
            <button onclick="createNewProject()" class="btn btn-pink">Create New Project</button>
          </div>`;
      } catch (e) {
        console.error(e);
      }
    }

    function createNewProject() {
      const name = prompt("Project Name:");
      if (!name) return;
      const desc = prompt("Description (optional):") || "";

      fetch('http://127.0.0.1:5000/api/projects', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name, description: desc })
      }).then(() => loadProjects());
    }

    function openProject(id) {
      sessionStorage.setItem('currentProjectId', id);
      location.href = 'project-detail.html';
    }

    function logout() {
      sessionStorage.clear();
      location.href = 'indexing.html';
    }

    loadProjects();
  </script>
</body>
</html>
