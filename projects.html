<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashbord.html">← Back to Dashboard</a>
    <button onclick="logout()" class="btn btn-outline-light">Logout</button>
  </div>
</nav>
  <div class="container mt-4">
    <h2>My Projects</h2>
    <button onclick="createProject()" class="btn btn-success mb-3">+ New Project</button>
    <div id="projectList" class="row"></div>
  </div>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) location.href = 'index.html';

    async function loadProjects() {
      const res = await fetch('http://127.0.0.1:5000/api/projects', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const projects = await res.json();
      const html = projects.map(p => `
        <div class="col-md-4 mb-3">
          <div class="card">
            <div class="card-body">
              <h5>${p.name}</h5>
              <p>${p.description || ''}</p>
              <button onclick="goToProject(${p.id})" class="btn btn-primary">Open Project</button>
            </div>
          </div>
        </div>
      `).join('');
      document.getElementById('projectList').innerHTML = html || '<p>No projects yet.</p>';
    }

    function createProject() {
      const name = prompt('Project name:');
      if (!name) return;
      fetch('http://127.0.0.1:5000/api/projects', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name })
      }).then(() => loadProjects());
    }

    function goToProject(id) {
      sessionStorage.setItem('currentProjectId', id);
      location.href = 'project-detail.html';
    }

    function logout() { sessionStorage.clear(); location.href = 'index.html'; }

    loadProjects();
  </script>
</body>
</html>
